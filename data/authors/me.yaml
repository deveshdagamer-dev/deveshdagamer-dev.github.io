bio: |
  I am a Research Associate at the New Chemistry Unit of the Jawaharlal Nehru Centre for Advanced
  Scientific Research (JNCASR), Bangalore. My research sits at the interface of solid-state
  chemistry, crystallography and magnetism, with a focus on lead-free halide double perovskites
  containing open-shell transition-metal ions. I recently completed my PhD at JNCASR under
  Prof. C.N.R. Rao, FRS and Dr. Pratap Vishnoi, where I developed Mo(III)-based halide double
  perovskite single crystals across one-, two- and three-dimensional connectivities.
