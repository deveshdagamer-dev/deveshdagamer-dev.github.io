name: Deploy static website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html research.html publications.html highlights.html gallery.html news.html contact.html _site/
          cp .nojekyll CNAME sitemap.xml favicon.ico favicon-16x16.png favicon-32x32.png apple-touch-icon.png android-chrome-192x192.png _site/
          mkdir -p _site/assets
          cp assets/site.css _site/assets/site.css
          cp assets/site.js assets/home.js assets/gallery.js _site/assets/
          cp -R assets/images _site/assets/images
          cp -R assets/docs _site/assets/docs
          cp -R assets/icons _site/assets/icons
          mkdir -p _site/assets/media
          cp assets/media/home-periodic-table-mo-transition.mp4 _site/assets/media/
          if [ -d public/assets ]; then
            mkdir -p _site/public
            cp -R public/assets _site/public/assets
          fi

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
